# Tier guidance:
#   1 — regional / public-health wires you weight heavily
#   2 — broader media & outbreak-focused outlets (noisy; good for alerts)
#   3 — general science news (very noisy; relies on keyword gate)
#
# URLs change — if a feed starts failing, swap it and re-run ingest locally.
keywords:
  - hantavirus
  - orthohantavirus
  - "hantavirus pulmonary"
  - hps

sources:
  - id: paho-news
    name: PAHO Newsroom
    tier: 1
    rss_url: https://www.paho.org/en/rss.xml

  - id: cdc-media
    name: CDC Media Library (RSS)
    tier: 1
    rss_url: https://tools.cdc.gov/api/v2/resources/media/rss.xml

  - id: bbc-health
    name: BBC News — Health
    tier: 2
    rss_url: https://feeds.bbci.co.uk/news/health/rss.xml

  - id: cidrap
    name: CIDRAP News & Perspective
    tier: 2
    rss_url: https://www.cidrap.umn.edu/rss.xml

  - id: science-news
    name: Science Magazine — News
    tier: 3
    rss_url: https://www.science.org/rss/news_current.xml
