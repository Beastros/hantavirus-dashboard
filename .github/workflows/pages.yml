name: GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
  # Ingest commits `public/data/*` using `GITHUB_TOKEN`; those pushes do not fire
  # `push` workflows. Without this, GitHub Pages keeps serving an older `dist/`
  # (stale JSON baked in at last build). Rebuild when ingest finishes successfully.
  workflow_run:
    workflows:
      - 'Ingest RSS + AI extraction'
    types:
      - completed
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: |
          npm ci
          echo "Token present: ${{ secrets.VITE_MAPBOX_TOKEN != '' }}"
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
