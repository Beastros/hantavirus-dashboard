name: Ingest RSS + AI extraction
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: ingest-main
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r ingest/requirements.txt
      - name: Mirror r/hantavirus intel (hot + new)
        continue-on-error: true
        working-directory: ingest
        env:
          REDDIT_SUBREDDIT: hantavirus
          REDDIT_HOT_LIMIT: '18'
        run: python reddit_hot.py
      - name: Run ingest (RSS + AI)
        continue-on-error: true
        working-directory: ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
        run: python run.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date -u +%Y-%m-%dT%H:%M:%SZ > public/data/last-build.txt
          git add public/data/
          git commit -m "chore: ingest refresh" || echo "[info] nothing to commit"
          git fetch origin main
          git pull --rebase origin main
          git push origin main

  publish-pages:
    needs: ingest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
