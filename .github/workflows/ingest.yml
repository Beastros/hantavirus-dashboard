name: Ingest RSS + AI extraction
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r ingest/requirements.txt
      - name: Run ingest
        working-directory: ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
        run: python run.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date -u +%Y-%m-%dT%H:%M:%SZ > public/data/last-build.txt
          git add public/data/
          git commit -m "chore: ingest refresh" || echo "nothing to commit"
          git push
