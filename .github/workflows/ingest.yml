@'
name: Ingest RSS + AI extraction
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r ingest/requirements.txt
      - name: Run ingest
        working-directory: ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIS_API_KEY: ${{ secrets.AIS_API_KEY }}
        run: python run.py
      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json public/data/cases-individual.json \
                  public/data/ingest-status.json public/data/ship-position.json \
                  public/data/trends.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: ingest refresh $(date -u +%H:%MZ)"
            git push
          fi
'@ | Set-Content .github\workflows\ingest.yml -Encoding utf8

git add -A
git commit -m "fix: ingest workflow yaml"
git push
