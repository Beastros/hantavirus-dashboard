name: Ingest RSS

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ingest dependencies
        run: pip install -r ingest/requirements.txt

      - name: Run ingest
        working-directory: ingest
        run: python run.py

      - name: Commit news data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          if git diff --staged --quiet; then
            echo "No news.json changes."
          else
            git commit -m "chore: refresh ingested news data"
            git push
          fi
